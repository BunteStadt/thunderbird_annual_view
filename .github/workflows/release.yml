name: Build and Release Thunderbird XPI

permissions:
  contents: write  # needed to create releases and upload files

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'   # Run on version tags, e.g., v1.0.0

jobs:
  # Reuse the shared build workflow
  build:
    uses: ./.github/workflows/build.yml

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download XPI artifact
        uses: actions/download-artifact@v4
        with:
          name: calendar-annual-view-xpi
          path: dist/

      - name: Rename XPI with version tag
        run: |
          cp dist/calendar-annual-view.xpi dist/calendar-annual-view-${{ github.ref_name }}.xpi

      - name: Install Playwright
        run: |
          npm install --no-save --package-lock=false playwright
          npx playwright install --with-deps chromium

      - name: Generate sample images
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          YEAR_VIEW_URL: http://127.0.0.1:8000/src/ui/year-view/year-view.html
        run: |
          python3 -m http.server 8000 >/tmp/calendar-screenshots-http.log 2>&1 &
          SERVER_PID=$!
          trap "kill $SERVER_PID" EXIT
          node scripts/generate-sample-images.mjs

      - name: Archive sample images
        run: |
          mkdir -p dist
          zip -r dist/calendar-annual-view-media-${GITHUB_REF##*/}.zip media/generated/${GITHUB_REF##*/}

      - name: Upload XPI and media to release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/calendar-annual-view-${{ github.ref_name }}.xpi
            dist/calendar-annual-view-media-${{ github.ref_name }}.zip
            media/generated/${{ github.ref_name }}/*.png
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: "Automatic build of XPI"
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
