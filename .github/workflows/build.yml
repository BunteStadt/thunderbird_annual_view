name: Build XPI

on:
  workflow_call:
    outputs:
      xpi-path:
        description: "Path to the built XPI"
        value: ${{ jobs.build.outputs.xpi-path }}

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      xpi-path: ${{ steps.build-xpi.outputs.xpi-path }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install zip
        run: sudo apt-get update && sudo apt-get install -y zip

      - name: Build XPI
        id: build-xpi
        run: |
          mkdir -p dist/package/experiments/calendar
          cp -R manifest.json src submodules icons dist/package/
          cp -R submodules/calendar/experiments/calendar/. dist/package/experiments/calendar/
          cd dist/package
          zip -r ../calendar-annual-view.xpi \
            manifest.json src icons experiments
          echo "xpi-path=dist/calendar-annual-view.xpi" >> "$GITHUB_OUTPUT"

      - name: Upload XPI artifact
        uses: actions/upload-artifact@v4
        with:
          name: calendar-annual-view-xpi
          path: dist/calendar-annual-view.xpi
          retention-days: 7